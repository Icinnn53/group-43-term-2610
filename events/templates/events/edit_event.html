<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event</title>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #080b14;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: rgba(10, 14, 24, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .nav-logo .logo-dot {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
        }

        .nav-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 13px;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.07);
        }

        .container {
            max-width: 720px;
            margin: 48px auto;
            padding: 0 24px 80px;
        }

        .page-heading {
            font-size: 22px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-heading::before {
            content: '';
            width: 4px;
            height: 22px;
            background: #6366f1;
            border-radius: 2px;
        }

        .page-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin-bottom: 32px;
        }

        .page-sub strong {
            color: #a5b4fc;
        }

        .form-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 32px;
        }

        /* Style Django's {{ form.as_p }} output */
        form p {
            margin-bottom: 16px;
        }

        form label {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            display: block;
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: rgba(99,102,241,0.5);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #6366f1;
            display: inline-block;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            background: #6366f1;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #4f46e5;
        }

        .btn-secondary {
            background: transparent;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="{% url 'home' %}" class="nav-logo">
        <div class="logo-dot"></div>
        MMU Events
    </a>

    <a href="{% url 'event_detail' event.id %}" class="nav-link">
        <i class="ti ti-arrow-left"></i> Back
    </a>
</div>

<div class="container">

    <div class="page-heading">Edit Event</div>
    <div class="page-sub">Editing: <strong>{{ event.title }}</strong></div>

    <div class="form-card">

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="form-actions">
                <button type="submit" class="btn">
                    Save Changes
                </button>

                <a href="{% url 'event_detail' event.id %}" class="btn-secondary">
                    Cancel
                </a>
            </div>
        </form>

    </div>

</div>

</body>
</html>
