{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}Products{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #07070f;
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-purple {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(109,40,217,0.55) 0%, transparent 70%);
            top: -120px; left: -160px;
        }
        .orb-violet {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, transparent 70%);
            top: 180px; right: -140px;
        }
        .orb-pink {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(168,85,247,0.25) 0%, transparent 70%);
            bottom: 80px; left: 30%;
        }

        .topnav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-wrap: wrap;
            gap: 10px;
        }
        .topnav-brand {
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.3px;
        }
        .topnav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .topnav-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            padding: 7px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            transition: all .2s;
        }
        .topnav-back:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
        }

        .page-wrap {
            position: relative;
            z-index: 5;
            max-width: 1100px;
            margin: 48px auto;
            padding: 0 24px 80px;
        }

        .page-wrap.narrow { max-width: 820px; }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }

        .page-title {
            font-size: clamp(24px, 4vw, 34px);
            font-weight: 800;
            letter-spacing: -0.6px;
            color: #fff;
        }

        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #c4b5fd;
            background: rgba(139,92,246,0.18);
            border: 1px solid rgba(139,92,246,0.35);
            padding: 5px 12px;
            border-radius: 999px;
            margin-bottom: 18px;
        }

        .glass-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 16px;
            backdrop-filter: blur(12px);
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-bottom: 10px;
        }
        .section-body {
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255,255,255,0.75);
        }

        .poster-wrap {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 32px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .poster-wrap img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
        }

        /* ── BUTTONS ── */
        .btn-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        .btn-primary-purple {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            padding: 10px 22px;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            box-shadow: 0 4px 18px rgba(109,40,217,0.45);
        }
        .btn-primary-purple:hover { opacity: .88; transform: translateY(-1px); color: #fff; }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.1); }

        .btn-danger-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-size: 14px;
            font-weight: 500;
            color: #fca5a5;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-danger-ghost:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.45); color: #fca5a5; }

        .btn-success-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-size: 14px;
            font-weight: 500;
            color: #86efac;
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.25);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: default;
        }

        .btn-warn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-size: 14px;
            font-weight: 500;
            color: #fde68a;
            background: rgba(234,179,8,0.1);
            border: 1px solid rgba(234,179,8,0.25);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-warn:hover { background: rgba(234,179,8,0.18); border-color: rgba(234,179,8,0.45); color: #fde68a; }

        .btn-teal {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-size: 14px;
            font-weight: 500;
            color: #67e8f9;
            background: rgba(6,182,212,0.1);
            border: 1px solid rgba(6,182,212,0.25);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-teal:hover { background: rgba(6,182,212,0.2); border-color: rgba(6,182,212,0.45); color: #67e8f9; }

        .inline-form { display: contents; }

        /* ── PRODUCT GRID (list page) ── */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
            transition: all 0.2s;
        }
        .product-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(139,92,246,0.35);
            transform: translateY(-2px);
        }

        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .product-img-placeholder {
            width: 100%;
            height: 180px;
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.25);
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .product-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .product-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }
        .product-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
            flex: 1;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .meta-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: rgba(255,255,255,0.35);
        }
        .meta-value {
            color: #fff;
            font-weight: 600;
        }
        .meta-price {
            color: #c4b5fd;
            font-size: 17px;
            font-weight: 700;
        }

        .stock-pill {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 999px;
            text-transform: uppercase;
        }
        .stock-in { background: rgba(34,197,94,0.12); color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
        .stock-out { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }

        .stall-tag {
            font-size: 11px;
            color: #c4b5fd;
            background: rgba(139,92,246,0.15);
            border: 1px solid rgba(139,92,246,0.3);
            padding: 4px 10px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .product-footer {
            display: flex;
            gap: 8px;
            padding: 14px 20px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 16px;
        }

        @media (max-width: 600px) {
            .topnav { padding: 16px 20px; }
            .topnav-brand { font-size: 16px; }
            .topnav-back { font-size: 12px; padding: 6px 10px; }

            .page-wrap { margin: 28px auto; padding: 0 16px 60px; }
            .glass-card { padding: 20px; }
            .product-grid { grid-template-columns: 1fr; }
            .date-grid { grid-template-columns: 1fr !important; gap: 16px !important; }

            .btn-area {
                flex-direction: column;
            }
            .btn-area > a,
            .btn-area > div,
            .btn-area > form.inline-form {
                width: 100%;
            }
            .btn-primary-purple,
            .btn-ghost,
            .btn-danger-ghost,
            .btn-success-ghost,
            .btn-warn,
            .btn-teal {
                width: 100%;
            }

            .product-footer {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="bg-orb orb-purple"></div>
<div class="bg-orb orb-violet"></div>
<div class="bg-orb orb-pink"></div>

<nav class="topnav">
    <a href="{% url 'home' %}" class="topnav-brand">● Events</a>
    <div class="topnav-links">
        <a href="{% url 'home' %}" class="topnav-back">Home</a>
        <a href="{% url 'stall_list' %}" class="topnav-back">Stalls</a>
        <a href="{% url 'product_list' %}" class="topnav-back">Products</a>
    </div>
</nav>

<div class="page-wrap">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
