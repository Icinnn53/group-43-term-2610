{% extends "products/base.html" %}

{% block content %}

<h2>Products for {{ stall.name }}</h2>

<!-- 🔥 FIX: go back to stall list instead of product_list -->
<a href="{% url 'stall_list' %}">← Back to Stalls</a>

<!-- 🔥 ADD PRODUCT BUTTON (important for your workflow) -->
<a href="{% url 'product_create' %}?stall={{ stall.id }}" class="btn-box">
    + Add Product
</a>

<hr>

{% for p in products %}
<div class="card">

    <h3>{{ p.name }}</h3>

    <p>RM {{ p.price }}</p>

    <p>{{ p.description }}</p>

    <a href="{% url 'product_detail' p.id %}" class="btn">View</a>

</div>
{% empty %}
<p>No products in this stall.</p>
{% endfor %}

{% endblock %}
