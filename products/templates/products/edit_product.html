{% extends "products/base.html" %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<div class="page-wrap narrow" style="margin:0;padding:0;">

    <div class="page-header">
        <div class="page-title">Edit Product</div>
    </div>

    <div class="glass-card">

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {% if product.product_image %}
                <div style="margin-bottom:20px;">
                    <div class="section-label">Current Product Image</div>
                    <img src="{{ product.product_image.url }}"
                         alt="{{ product.name }}"
                         style="max-width:200px;border-radius:12px;border:1px solid rgba(255,255,255,0.09);display:block;margin-top:8px;">
                </div>
            {% endif %}

            <div style="margin-bottom:18px;">
                <div class="section-label">Change Product Image</div>
                <input type="file" name="product_image" accept="image/*" style="margin-top:8px;">
            </div>

            <div style="margin-bottom:18px;">
                <div class="section-label">Stall</div>
                <select name="stall" style="margin-top:8px;">
                    {% for s in stalls %}
                        <option value="{{ s.id }}"
                            {% if product.stall.id == s.id %}selected{% endif %}>
                            {{ s.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom:18px;">
                <div class="section-label">Product Name</div>
                <input type="text" name="name" value="{{ product.name }}" style="margin-top:8px;">
            </div>

            <div style="margin-bottom:18px;">
                <div class="section-label">Price</div>
                <input type="text" name="price" value="{{ product.price }}" style="margin-top:8px;">
            </div>

            <div style="margin-bottom:18px;">
                <div class="section-label">Stock Quantity</div>
                <input type="number" name="stock_quantity" value="{{ product.stock_quantity }}" min="0" style="margin-top:8px;">
            </div>

            <div style="margin-bottom:24px;">
                <div class="section-label">Description</div>
                <textarea name="description" style="margin-top:8px;">{{ product.description }}</textarea>
            </div>

            <div class="btn-area">
                <button type="submit" class="btn-primary-purple">Save Changes</button>
                <a href="{% url 'product_detail' product.id %}" class="btn-ghost">Cancel</a>
            </div>

        </form>

    </div>

</div>

<style>
    /* Scoped input styling since base.html doesn't style raw form fields */
    input[type="text"],
    input[type="number"],
    input[type="file"],
    select,
    textarea {
        width: 100%;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.05);
        color: #e5e7eb;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
        outline: none;
        box-sizing: border-box;
        transition: border 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
        border-color: rgba(139,92,246,0.5);
    }

    textarea {
        min-height: 100px;
        resize: vertical;
    }

    input[type="file"] {
        padding: 8px 10px;
        color: rgba(255,255,255,0.6);
    }
</style>

{% endblock %}
