{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Owner Panel</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #07070f;
            color: #e5e7eb;
            font-family: 'Inter', Arial, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── BACKGROUND ORBS ── */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-purple {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(109,40,217,0.55) 0%, transparent 70%);
            top: -120px; left: -160px;
        }
        .orb-violet {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, transparent 70%);
            top: 180px; right: -140px;
        }
        .orb-pink {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(168,85,247,0.25) 0%, transparent 70%);
            bottom: 80px; left: 30%;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            position: sticky;
            top: 0;
        }

        .nav-logo {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            margin-right: 20px;
        }

        .nav-logo .logo-dot {
            width: 8px;
            height: 8px;
            background: #a855f7;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(168,85,247,0.8);
        }

        .navbar a {
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 14px;
            border: 1px solid transparent;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .navbar a:hover {
            color: #fff;
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
        }

        .add-btn {
            background: linear-gradient(135deg, #7c3aed, #6d28d9) !important;
            color: #fff !important;
            font-weight: 600 !important;
            margin-left: 6px;
            box-shadow: 0 4px 18px rgba(109,40,217,0.45);
        }

        .add-btn:hover {
            opacity: .88;
            border-color: transparent !important;
        }

        /* ── CONTAINER ── */
        .container {
            position: relative;
            z-index: 5;
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* ── CARD (glassmorphism) ── */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 16px;
            backdrop-filter: blur(12px);
            transition: all 0.2s;
        }

        .card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(139,92,246,0.3);
        }

        .card p {
            font-size: 14px;
            color: rgba(255,255,255,0.75);
            margin-bottom: 10px;
        }

        .card p b {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            margin-right: 4px;
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 18px rgba(109,40,217,0.35);
        }

        .btn:hover { opacity: .88; transform: translateY(-1px); color: #fff; }

        .btn-success {
            background: rgba(34,197,94,0.1);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.25);
            box-shadow: none;
        }
        .btn-success:hover { background: rgba(34,197,94,0.18); color: #86efac; opacity: 1; transform: none; }

        .btn-danger {
            background: rgba(239,68,68,0.08);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.25);
            box-shadow: none;
        }
        .btn-danger:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.45); color: #fca5a5; opacity: 1; transform: none; }

        .btn-outline {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.28);
            color: #fff;
            opacity: 1;
            transform: none;
        }

        /* ── FORMS ── */
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            margin-top: 6px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #e5e7eb;
            font-size: 14px;
            font-family: 'Inter', Arial, sans-serif;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: rgba(139,92,246,0.5);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.25);
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
        }

        /* ── PAGE HEADING ── */
        .page-heading {
            font-size: clamp(22px, 4vw, 30px);
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-heading::before {
            content: '';
            width: 5px;
            height: 26px;
            background: linear-gradient(180deg, #7c3aed, #a855f7);
            border-radius: 3px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 16px;
        }

        @media (max-width: 600px) {
            .navbar { padding: 14px 20px; flex-wrap: wrap; }
            .container { padding: 32px 16px 60px; }
            .card { padding: 20px; }
        }
    </style>
</head>

<body>

<div class="bg-orb orb-purple"></div>
<div class="bg-orb orb-violet"></div>
<div class="bg-orb orb-pink"></div>

<div class="navbar">

    <a href="{% url 'home' %}" class="nav-logo">
        <div class="logo-dot"></div>
        MMU Events
    </a>

    <a href="{% url 'home' %}"><i class="ti ti-home" style="font-size:14px;margin-right:4px;"></i>Home</a>
    <a href="{% url 'owner_list' %}"><i class="ti ti-users" style="font-size:14px;margin-right:4px;"></i>Owners</a>
    <a href="{% url 'stall_list' %}"><i class="ti ti-building-store" style="font-size:14px;margin-right:4px;"></i>Stalls</a>

    {% if user.is_authenticated and user.role != "student" %}
        <a href="{% url 'stall_create' %}" class="add-btn">
            <i class="ti ti-plus" style="font-size:13px;margin-right:4px;"></i>Add Stall
        </a>
    {% endif %}

</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
