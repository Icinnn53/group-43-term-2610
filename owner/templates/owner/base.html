{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Panel</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #080b14;
            color: #e2e8f0;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: rgba(10, 14, 24, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            margin-right: 16px;
        }

        .nav-logo .logo-dot {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
        }

        .navbar a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 13px;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .navbar a:hover {
            color: #fff;
            background: rgba(255,255,255,0.07);
        }

        .add-btn {
            background: #6366f1 !important;
            color: #fff !important;
            font-size: 13px !important;
            font-weight: 500 !important;
            margin-left: 6px;
        }

        .add-btn:hover {
            background: #4f46e5 !important;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── CARD ── */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 14px;
            transition: all 0.2s;
        }

        .card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(99,102,241,0.3);
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #6366f1;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover { background: #4f46e5; color: #fff; }

        .btn-success { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
        .btn-success:hover { background: rgba(34,197,94,0.25); color: #86efac; }

        .btn-danger { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
        .btn-danger:hover { background: rgba(239,68,68,0.25); color: #fca5a5; }

        .btn-outline {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
        }

        /* ── FORMS ── */
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            margin-top: 6px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: rgba(99,102,241,0.5);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.25);
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
        }

        /* ── PAGE HEADING ── */
        .page-heading {
            font-size: 22px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-heading::before {
            content: '';
            width: 4px;
            height: 22px;
            background: #6366f1;
            border-radius: 2px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.25);
            font-size: 14px;
            border: 1px dashed rgba(255,255,255,0.08);
            border-radius: 14px;
        }
    </style>
</head>

<body>

<div class="navbar">

    <a href="{% url 'home' %}" class="nav-logo">
        <div class="logo-dot"></div>
        MMU Events
    </a>

    <a href="{% url 'home' %}"><i class="ti ti-home" style="font-size:14px;margin-right:4px;"></i>Home</a>
    <a href="{% url 'owner_list' %}"><i class="ti ti-users" style="font-size:14px;margin-right:4px;"></i>Owners</a>
    <a href="{% url 'stall_list' %}"><i class="ti ti-building-store" style="font-size:14px;margin-right:4px;"></i>Stalls</a>
    <a href="{% url 'dashboard' %}"><i class="ti ti-layout-dashboard" style="font-size:14px;margin-right:4px;"></i>Dashboard</a>

    {% if user.is_authenticated and user.role != "student" %}
        <a href="{% url 'stall_create' %}" class="add-btn">
            <i class="ti ti-plus" style="font-size:13px;margin-right:4px;"></i>Add Stall
        </a>
    {% endif %}

</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
