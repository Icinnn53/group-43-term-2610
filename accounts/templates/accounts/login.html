<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MMU Stall</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: Arial, sans-serif; 
            background: #080b14; 
            color: #e2e8f0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 24px;
        }

        .container { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.07);
            padding: 40px 32px; 
            border-radius: 16px; 
            width: 100%;
            max-width: 440px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h2 { 
            text-align: center; 
            color: #fff; 
            margin-bottom: 32px;
            font-size: 24px;
            font-weight: 600;
        }

        form p {
            margin-bottom: 20px;
            text-align: left;
        }

        /* Targets standard Django form labels */
        form label {
            display: block;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* Targets Django standard input elements rendered via {{ form.as_p }} */
        input { 
            width: 100%; 
            padding: 12px 16px; 
            background-color: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 8px; 
            font-size: 14px;
            color: #f1f5f9;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        input:focus {
            border-color: #6366f1;
            outline: none;
            background-color: rgba(99,102,241,0.03);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        button[type="submit"] { 
            width: 100%; 
            padding: 12px; 
            background: rgba(99,102,241,0.12);
            color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 10px; 
            font-size: 15px; 
            font-weight: 600;
            cursor: pointer; 
            margin-top: 12px;
            transition: all 0.2s;
        }

        button[type="submit"]:hover { 
            background: rgba(99,102,241,0.25);
            color: #fff;
            border-color: rgba(99,102,241,0.3);
        }

        .footer { 
            margin-top: 28px; 
            text-align: center; 
            font-size: 13px; 
            color: rgba(255,255,255,0.4);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 20px;
        }

        a { 
            color: #86efac; 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.2s;
        }

        a:hover { 
            color: #fff;
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login to MMU Stall</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <div class="footer">
            No account? <a href="{% url 'signup' %}">Sign up now</a>
        </div>
    </div>
</body>
</html>
