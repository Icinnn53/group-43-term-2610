{% extends 'vendor/base.html' %}
{% load static %}

{% block title %}Edit Vendor{% endblock %}

{% block content %}

<div class="card" style="max-width:500px; margin:auto;">

    <h2>Edit Vendor</h2>

    <form method="POST">
        {% csrf_token %}

        <p>Name</p>
        <input type="text" name="name" value="{{ vendor.name }}">

        <p>Phone</p>
        <input type="text" name="phone" value="{{ vendor.phone }}">

        <p>Social Media</p>
        <input type="text" name="social_media" value="{{ vendor.social_media }}">

        <p>Description</p>
        <input type="text" name="description" value="{{ vendor.description }}">

        <br><br>

        <button type="submit" class="btn btn-view">Save</button>

        <a href="{% url 'vendor_list' %}" class="btn">Cancel</a>

    </form>

</div>

{% endblock %}
