{% extends 'vendor/base.html' %}

{% block title %}Create Stall{% endblock %}

{% block content %}

<div class="card" style="max-width:500px; margin:auto;">

    <h1 class="title">Create Stall</h1>

    <form method="POST">
        {% csrf_token %}

        <!-- Vendor -->
        <label>Vendor</label>
        <select name="vendor">
            {% for v in vendors %}
                <option value="{{ v.id }}">{{ v.name }}</option>
            {% endfor %}
        </select>

        <br><br>

        <!-- Event Name -->
        <label>Event Name</label>
        <input type="text" name="event_name" required>

        <!-- Location -->
        <label>Location</label>
        <input type="text" name="location" required>

        <!-- Capacity -->
        <label>Capacity</label>
        <input type="number" name="capacity" value="0">

        <!-- Rental Fee -->
        <label>Rental Fee</label>
        <input type="number" name="rental_fee" step="0.01" value="0">

        <br><br>

        <button type="submit" class="btn btn-view full-btn">
            Create Stall
        </button>

    </form>

</div>

{% endblock %}
